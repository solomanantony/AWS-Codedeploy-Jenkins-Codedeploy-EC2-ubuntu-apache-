<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soloman Antony</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0d12;
      --accent: #3b82f6;
      --accent2: #10b981;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #1e2535;
      --card: #141927;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.13) 0%, transparent 70%);
      pointer-events: none;
    }
    .center {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }
    .label {
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 10vw, 6.5rem);
      font-weight: 800;
      line-height: 1;
      color: #fff;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    h1 em {
      font-style: normal;
      color: var(--accent);
    }
    .tagline {
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .status {
      margin-top: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.25);
      color: var(--accent2);
      font-size: 0.72rem;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      letter-spacing: 0.1em;
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.8s ease infinite;
    }
    .pipeline {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      justify-content: center;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    .stage {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--accent2);
    }
    .arrow { color: var(--muted); font-size: 0.8rem; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="label">// deployed via aws codepipeline</div>
    <h1>Soloman<br/><em>Antony</em></h1>
    <p class="tagline">ap-south-2 &nbsp;·&nbsp; EC2 &nbsp;·&nbsp; GitHub</p>
    <div class="status">
      <span class="dot"></span>
      DEPLOYMENT SUCCESSFUL
    </div>
    <div class="pipeline">
      <span class="stage">✓ Source</span>
      <span class="arrow">→</span>
      <span class="stage">✓ Build</span>
      <span class="arrow">→</span>
      <span class="stage">✓ Deploy</span>
    </div>
  </div>
</body>
</html>
